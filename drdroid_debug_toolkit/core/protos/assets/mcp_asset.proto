syntax = "proto3";
package core.protos.connectors;

import "google/protobuf/wrappers.proto";
import "google/protobuf/struct.proto";
import "core/protos/base.proto";

// MCP asset model — stores dynamic JSON output from MCP tool execution.
// Since MCP tools return arbitrary JSON, we use google.protobuf.Struct for flexibility.

message McpAssetModel {
  google.protobuf.UInt64Value id = 1;
  core.protos.Source connector_type = 2;
  core.protos.SourceModelType type = 3;
  int64 last_updated = 4;
  google.protobuf.StringValue name = 5;
  google.protobuf.Struct metadata = 6;
}

message McpAssets {
  repeated McpAssetModel assets = 1;
}

message McpAssetOptions {
  // No filters for MVP — all assets are returned
}
