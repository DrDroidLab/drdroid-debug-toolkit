syntax = "proto3";
package core.protos.playbooks;

import "google/protobuf/wrappers.proto";

message ConfluenceCloud {
  message FetchSpaces {
    google.protobuf.UInt32Value limit = 1;
    google.protobuf.StringValue cursor = 2;
  }

  message FetchFolders {
    google.protobuf.StringValue space_id = 1;
    google.protobuf.StringValue parent_id = 2;
    google.protobuf.UInt32Value limit = 3;
    google.protobuf.StringValue cursor = 4;
  }

  message FetchPages {
    google.protobuf.StringValue space_id = 1;
    google.protobuf.StringValue parent_id = 2;
    google.protobuf.UInt32Value limit = 3;
    google.protobuf.StringValue cursor = 4;
  }

  message FetchPageContent {
    google.protobuf.StringValue id = 1;
  }

  message FetchDocumentContent {
    google.protobuf.StringValue id = 1;
    google.protobuf.StringValue space_key = 2;
    google.protobuf.StringValue title = 3;
  }

  enum TaskType {
    UNKNOWN = 0;
    FETCH_DOCUMENT_CONTENT = 1;
    FETCH_SPACES = 2;
    FETCH_FOLDERS = 3;
    FETCH_PAGES = 4;
    FETCH_PAGE_CONTENT = 5;
  }

  TaskType type = 1;
  oneof task {
    FetchDocumentContent fetch_document_content = 2;
    FetchSpaces fetch_spaces = 3;
    FetchFolders fetch_folders = 4;
    FetchPages fetch_pages = 5;
    FetchPageContent fetch_page_content = 6;
  }
}